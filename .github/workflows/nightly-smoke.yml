name: Nightly Smoke
run-name: "Nightly smoke / ${{ github.ref_name }} / ${{ github.event_name }}"

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: nightly smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y expect jq
      - name: Assert VM systemd runtime
        run: |
          set -euo pipefail
          pid1="$(ps -p 1 -o comm= | tr -d '[:space:]')"
          if [[ "$pid1" != "systemd" ]]; then
            echo "Nightly VM gate requires PID 1 = systemd, got: ${pid1}" >&2
            exit 1
          fi
          sudo systemctl list-unit-files > /dev/null
      - name: Run nightly smoke lifecycle
        run: |
          set -euo pipefail
          chmod +x tests/e2e/*.sh
          tests/e2e/nightly_smoke_install_add_update_uninstall.sh
      - name: Complexity trend gate (stage 3)
        run: |
          set -euo pipefail
          COMPLEXITY_STAGE=3 bash scripts/check-shell-complexity.sh

  smoke-self-hosted:
    name: nightly smoke self-hosted
    if: ${{ vars.XRAY_ENABLE_SELF_HOSTED_ACTIONS == 'true' }}
    runs-on: [self-hosted, linux]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies (best-effort)
        run: |
          set -euo pipefail
          install_cmd=""
          if command -v apt-get >/dev/null 2>&1; then
            install_cmd="apt-get update -qq && apt-get install -y bash"
          elif command -v dnf >/dev/null 2>&1; then
            install_cmd="dnf -y install bash"
          elif command -v yum >/dev/null 2>&1; then
            install_cmd="yum -y install bash"
          fi
          if [[ -n "$install_cmd" ]]; then
            if [[ "${EUID:-$(id -u)}" -eq 0 ]]; then
              bash -lc "$install_cmd"
            elif command -v sudo >/dev/null 2>&1; then
              sudo bash -lc "$install_cmd"
            fi
          fi
      - name: Run nightly self-hosted lifecycle
        run: |
          set -euo pipefail
          bash tests/lint.sh --fast
          if [[ -c /dev/kvm ]]; then
            LAB_VM_AUTO_INSTALL_DEPS=true make vm-lab-smoke
          else
            make lab-smoke
          fi
      - name: Generate vm proof-pack
        if: ${{ success() }}
        run: |
          set -euo pipefail
          if [[ ! -c /dev/kvm ]]; then
            echo "no /dev/kvm; skipping vm proof-pack generation"
            exit 0
          fi

          make vm-proof-pack
          proof_env="$(bash -lc 'source scripts/lab/common.sh; lab_vm_latest_proof_env')"
          if [[ -f "$proof_env" ]]; then
            # shellcheck disable=SC1090
            source "$proof_env"
            {
              echo "LAB_VM_PROOF_PACK_DIR=${LAB_VM_PROOF_PACK_DIR}"
              echo "LAB_VM_PROOF_PACK_TAR=${LAB_VM_PROOF_PACK_TAR}"
              echo "LAB_VM_PROOF_PACK_MANIFEST=${LAB_VM_PROOF_PACK_MANIFEST}"
            } >> "$GITHUB_ENV"
          fi
      - name: Upload vm proof-pack
        if: ${{ env.LAB_VM_PROOF_PACK_TAR != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nightly-self-hosted-vm-proof-pack
          path: |
            ${{ env.LAB_VM_PROOF_PACK_TAR }}
            ${{ env.LAB_VM_PROOF_PACK_MANIFEST }}
      - name: Complexity trend gate (stage 3)
        run: |
          set -euo pipefail
          COMPLEXITY_STAGE=3 bash scripts/check-shell-complexity.sh
