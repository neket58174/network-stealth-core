name: Self-hosted Smoke
run-name: "Self-hosted Smoke / ${{ github.ref_name }} / ${{ github.event_name }}"

on:
  workflow_dispatch:

jobs:
  lifecycle-smoke:
    name: lifecycle smoke (${{ vars.XRAY_ENABLE_SELF_HOSTED_ACTIONS == 'true' && 'self-hosted' || 'ubuntu-24.04' }})
    runs-on: ${{ fromJSON(vars.XRAY_ENABLE_SELF_HOSTED_ACTIONS == 'true' && '["self-hosted","linux"]' || '["ubuntu-24.04"]') }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Runner mode
        run: |
          if [[ "${{ vars.XRAY_ENABLE_SELF_HOSTED_ACTIONS }}" == "true" ]]; then
            echo "Self-hosted mode enabled"
          else
            echo "Self-hosted mode disabled, fallback to ubuntu-24.04"
          fi
      - name: Install dependencies (best-effort)
        run: |
          set -euo pipefail
          install_cmd=""
          if command -v apt-get >/dev/null 2>&1; then
            install_cmd="apt-get update -qq && apt-get install -y bats shellcheck"
          elif command -v dnf >/dev/null 2>&1; then
            install_cmd="dnf -y install bats shellcheck"
          elif command -v yum >/dev/null 2>&1; then
            install_cmd="yum -y install bats shellcheck"
          fi
          if [[ -n "$install_cmd" ]]; then
            if [[ "${EUID:-$(id -u)}" -eq 0 ]]; then
              bash -lc "$install_cmd"
            elif command -v sudo >/dev/null 2>&1; then
              sudo bash -lc "$install_cmd"
            fi
          fi
      - name: Run lint, complexity stage-3 and self-hosted lifecycle smoke
        run: |
          set -euo pipefail
          bash tests/lint.sh --fast
          COMPLEXITY_STAGE=3 bash scripts/check-shell-complexity.sh
          if [[ -c /dev/kvm ]]; then
            LAB_VM_AUTO_INSTALL_DEPS=true make vm-lab-smoke
          else
            make lab-smoke
          fi
      - name: Generate vm proof-pack
        if: ${{ success() }}
        run: |
          set -euo pipefail
          if [[ ! -c /dev/kvm ]]; then
            echo "no /dev/kvm; skipping vm proof-pack generation"
            exit 0
          fi

          make vm-proof-pack
          proof_env="$(bash -lc 'source scripts/lab/common.sh; lab_vm_latest_proof_env')"
          if [[ -f "$proof_env" ]]; then
            # shellcheck disable=SC1090
            source "$proof_env"
            {
              echo "LAB_VM_PROOF_PACK_DIR=${LAB_VM_PROOF_PACK_DIR}"
              echo "LAB_VM_PROOF_PACK_TAR=${LAB_VM_PROOF_PACK_TAR}"
              echo "LAB_VM_PROOF_PACK_MANIFEST=${LAB_VM_PROOF_PACK_MANIFEST}"
            } >> "$GITHUB_ENV"
          fi
      - name: Upload vm proof-pack
        if: ${{ env.LAB_VM_PROOF_PACK_TAR != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: self-hosted-vm-proof-pack
          path: |
            ${{ env.LAB_VM_PROOF_PACK_TAR }}
            ${{ env.LAB_VM_PROOF_PACK_MANIFEST }}
